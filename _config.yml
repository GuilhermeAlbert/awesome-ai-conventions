title: "Awesome AI Conventions"
description: "A curated list of emerging conventions, file standards, and protocols for building with AI agents."
url: "https://guilhermealbert.github.io"
baseurl: "/awesome-ai-conventions"
theme: "jekyll-theme-cayman"
plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
markdown: "kramdown"
highlighter: "rouge"
kramdown:
  input: GFM
exclude:
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - LICENSE
  - .github/
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
